  <h1>AshTale カード図鑑</h1>
  <div class="text-data">
    アッシュテイルの各カード(コラボカード、宝くじカード除く)を一覧にしております。絞り込み機能もついておりますので、どのようなステータスを持つカードかを調べたいときにご活用ください。各カードは、タップすると実際のカードデータを閲覧できます。<br>
    <br>
    なにかありましたら<a href="https://marshmallow-qa.com/re3ig61uxuunbsn">マシュマロ</a>まで。
    <br>
    <br>

        <span class="history-toggle-icon">▼</span>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>
