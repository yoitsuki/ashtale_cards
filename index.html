<!DOCTYPE html>
<html lang="jp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3P68B2HYPS"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3P68B2HYPS');
  </script>
  <link rel="stylesheet" href="style.css" />
  <title>Ash Tale カード図鑑</title>
</head>
<body>
  <h1>AshTale カード図鑑</h1>
  <div class="text-data">
    アッシュテイルの各カード(コラボカード、宝くじカード除く)を一覧にしております。絞り込み機能もついておりますので、どのようなステータスを持つカードかを調べたいときにご活用ください。各カードは、タップすると実際のカードデータを閲覧できます。<br>
    <br>
    なにかありましたら<a href="https://marshmallow-qa.com/re3ig61uxuunbsn">マシュマロ</a>まで。
    <br>
    <br>
    <div class="update-history" id="updateHistory">
      <div class="latest-update" onclick="toggleHistory(event)">
        <span>最終更新日：<span id="latestUpdateText">--</span></span>
        <span class="history-toggle-icon">▼</span>
      </div>
      <div id="historyList" class="history-list"></div>
    </div>
  </div>

  <div class="filter-container">
    <h3>検索条件</h3>
    
    <div class="search-box-container">
      <input type="text" id="nameSearchInput" placeholder="カード名で検索..." />
    </div>

    <div class="search-options">
      <label><input type="radio" name="searchType" value="AND" checked> AND検索</label>
      <label><input type="radio" name="searchType" value="OR"> OR検索</label>
      <button onclick="resetFilters()" class="reset-btn">フィルタリセット</button>
    </div>

    <div class="filter-section">
        <div class="filter-header" onclick="toggleCollapsible('category-filter')">カテゴリ<span class="toggle-label">[閉じる]</span></div>
        <div id="category-filter" class="filter-content">
            <div class="filter-group">
              <button data-type="category" data-value="武器" onclick="toggleFilter('category', '武器', this)">武器</button>
              <button data-type="category" data-value="腕" onclick="toggleFilter('category', '腕', this)">腕</button>
              <button data-type="category" data-value="防具" onclick="toggleFilter('category', '防具', this)">防具</button>
              <button data-type="category" data-value="装飾" onclick="toggleFilter('category', '装飾', this)">装飾</button>
              <button data-type="category" data-value="頭" onclick="toggleFilter('category', '頭', this)">頭</button>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-header" onclick="toggleCollapsible('rare-filter')">レア度<span class="toggle-label">[閉じる]</span></div>
        <div id="rare-filter" class="filter-content">
            <div class="filter-group">
              <button data-type="rare" data-value="幻" onclick="toggleFilter('rare', '幻', this)">幻</button>
              <button data-type="rare" data-value="鋼" onclick="toggleFilter('rare', '鋼', this)">鋼</button>
              <button data-type="rare" data-value="天" onclick="toggleFilter('rare', '天', this)">天</button>
              <button data-type="rare" data-value="赤" onclick="toggleFilter('rare', '赤', this)">赤</button>
              <button data-type="rare" data-value="金" onclick="toggleFilter('rare', '金', this)">金</button>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <div class="filter-header" onclick="toggleCollapsible('rank-filter')">ランク<span class="toggle-label">[閉じる]</span></div>
        <div id="rank-filter" class="filter-content">
            <div class="filter-group">
              <button data-type="rank" data-value="12" onclick="toggleFilter('rank', '12', this)">12</button>
              <button data-type="rank" data-value="11" onclick="toggleFilter('rank', '11', this)">11</button>
              <button data-type="rank" data-value="10" onclick="toggleFilter('rank', '10', this)">10</button>
              <button data-type="rank" data-value="9" onclick="toggleFilter('rank', '9', this)">9</button>
              <button data-type="rank" data-value="8" onclick="toggleFilter('rank', '8', this)">8</button>
              <button data-type="rank" data-value="7" onclick="toggleFilter('rank', '7', this)">7</button>
              <button data-type="rank" data-value="6" onclick="toggleFilter('rank', '6', this)">6</button>
              <button data-type="rank" data-value="3" onclick="toggleFilter('rank', '3', this)">3</button>
              <button data-type="rank" data-value="1" onclick="toggleFilter('rank', '1', this)">1</button>
            </div>
        </div>
    </div>

    <div class="filter-section">
      <div class="filter-header" onclick="toggleCollapsible('status-filter')">ステータス<span class="toggle-label">[閉じる]</span></div>
      <div id="status-filter" class="filter-content">
          <div class="filter-group">
            <button data-type="status" data-value="攻撃%" onclick="toggleFilter('status', '攻撃%', this)">攻撃%</button>
            <button data-type="status" data-value="会心率" onclick="toggleFilter('status', '会心率', this)">会心率</button>
            <button data-type="status" data-value="会心ダメージ" onclick="toggleFilter('status', '会心ダメージ', this)">会心ダメージ</button>
            <button data-type="status" data-value="防御無視" onclick="toggleFilter('status', '防御無視', this)">防御無視</button>
            <button data-type="status" data-value="ダメージ倍率" onclick="toggleFilter('status', 'ダメージ倍率', this)">ダメージ倍率</button>
            <button data-type="status" data-value="対ボス与ダメ増" onclick="toggleFilter('status', '対ボス与ダメ増', this)">対ボス与ダメ増</button>
            <button data-type="status" data-value="対高HP与ダメ増" onclick="toggleFilter('status', '対高HP与ダメ増', this)">対高HP与ダメ増</button>
            <button data-type="status" data-value="対低HP与ダメ増" onclick="toggleFilter('status', '対低HP与ダメ増', this)">対低HP与ダメ増</button>
            <button data-type="status" data-value="状態異常与ダメ増" onclick="toggleFilter('status', '状態異常与ダメ増', this)">状態異常与ダメ増</button>
            <button data-type="status" data-value="命中率" onclick="toggleFilter('status', '命中率', this)">命中率</button>
            <button data-type="status" data-value="状態異常命中率" onclick="toggleFilter('status', '状態異常命中率', this)">状態異常命中率</button>
            <button data-type="status" data-value="防御%" onclick="toggleFilter('status', '防御%', this)">防御%</button>
            <button data-type="status" data-value="HP%" onclick="toggleFilter('status', 'HP%', this)">HP%</button>
            <button data-type="status" data-value="ガード率" onclick="toggleFilter('status', 'ガード率', this)">ガード率</button>
            <button data-type="status" data-value="回避率" onclick="toggleFilter('status', '回避率', this)">回避率</button>
            <button data-type="status" data-value="会心率耐性" onclick="toggleFilter('status', '会心率耐性', this)">会心率耐性</button>
            <button data-type="status" data-value="会心ダメ耐性" onclick="toggleFilter('status', '会心ダメ耐性', this)">会心ダメ耐性</button>
            <button data-type="status" data-value="対高低HPダメ耐性" onclick="toggleFilter('status', '対高低HPダメ耐性', this)">対高低HPダメ耐性</button>
            <button data-type="status" data-value="対ボス被ダメ減" onclick="toggleFilter('status', '対ボス被ダメ減', this)">対ボス被ダメ減</button>
            <button data-type="status" data-value="状態異常耐性" onclick="toggleFilter('status', '状態異常耐性', this)">状態異常耐性</button>
            <button data-type="status" data-value="状態異常ダメ耐性" onclick="toggleFilter('status', '状態異常ダメ耐性', this)">状態異常ダメ耐性</button>
            <button data-type="status" data-value="与治療効果" onclick="toggleFilter('status', '与治療効果', this)">与治療効果</button>
            <button data-type="status" data-value="被治療効果" onclick="toggleFilter('status', '被治療効果', this)">被治療効果</button>
            <button data-type="status" data-value="HP吸収率" onclick="toggleFilter('status', 'HP吸収率', this)">HP吸収率</button>
            <button data-type="status" data-value="対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ与ダメ増" onclick="toggleFilter('status', '対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ与ダメ増', this)">対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ与ダメ増</button>
            <button data-type="status" data-value="対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ被ダメ減" onclick="toggleFilter('status', '対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ被ダメ減', this)">対ファイ/ウィ/スカ/プリ/サモ/剣豪/プレ被ダメ減</button>
            <button data-type="status" data-value="対高HPダメ倍率" onclick="toggleFilter('status', '対高HPダメ倍率', this)">対高HPダメ倍率</button>
            <button data-type="status" data-value="対低HPダメ倍率" onclick="toggleFilter('status', '対低HPダメ倍率', this)">対低HPダメ倍率</button>
            <button data-type="status" data-value="状態異常ダメ倍率" onclick="toggleFilter('status', '状態異常ダメ倍率', this)">状態異常ダメ倍率</button>
          </div>
      </div>
    </div>
  </div>

  <h3>検索結果</h3>
  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Category</th>
        <th>Status(Full Op.)</th>
      </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
  </table>

  <div id="no-data-msg" style="display: none; text-align: center; font-weight: bold; margin: 20px;">
    該当するデータがありませんでした。
  </div>

  <div id="imageModal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
